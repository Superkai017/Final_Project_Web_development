<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SneakerVault — Checkout</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>

  <nav class="navbar">
    <div class="nav-logo">LUMĒ</div>
    <div class="nav-links">
      <a href="index.html">Shop</a>
      <a href="cart.html">Cart</a>
      <a href="checkout.html" class="active">Checkout</a>
    </div>
    <div class="nav-actions">
      <button class="dark-toggle" id="darkToggle" title="Toggle dark mode">🌙</button>
      <a href="cart.html" class="cart-icon">
        🛒 <span class="cart-count" id="cartCount">0</span>
      </a>
    </div>
  </nav>

  <main class="checkout-page">
    <h1 class="page-title">Check<em>out</em></h1>

    <div class="checkout-layout">
      <!-- FORM -->
      <div class="checkout-form-section">
        <h3>Shipping Details</h3>
        <div class="form-grid">
          <div class="form-group">
            <label>First Name</label>
            <input type="text" placeholder="John" id="firstName"/>
          </div>
          <div class="form-group">
            <label>Last Name</label>
            <input type="text" placeholder="Doe" id="lastName"/>
          </div>
          <div class="form-group full">
            <label>Email</label>
            <input type="email" placeholder="john@email.com" id="email"/>
          </div>
          <div class="form-group full">
            <label>Address</label>
            <input type="text" placeholder="123 Street Name" id="address"/>
          </div>
          <div class="form-group">
            <label>City</label>
            <input type="text" placeholder="City" id="city"/>
          </div>
          <div class="form-group">
            <label>ZIP Code</label>
            <input type="text" placeholder="10001" id="zip"/>
          </div>
        </div>

        <h3 style="margin-top:2rem">Payment</h3>
        <div class="form-grid">
          <div class="form-group full">
            <label>Card Number</label>
            <input type="text" placeholder="4242 4242 4242 4242" maxlength="19" id="cardNum"/>
          </div>
          <div class="form-group">
            <label>Expiry</label>
            <input type="text" placeholder="MM/YY" maxlength="5" id="expiry"/>
          </div>
          <div class="form-group">
            <label>CVV</label>
            <input type="text" placeholder="123" maxlength="3" id="cvv"/>
          </div>
        </div>

        <button class="btn-primary" id="placeOrderBtn" style="margin-top:2rem;width:100%">Place Order</button>
      </div>

      <!-- SUMMARY -->
      <aside class="checkout-summary">
        <h3>Order Review</h3>
        <div id="checkoutItems"></div>
        <div class="summary-row total" style="margin-top:1.5rem">
          <span>Total</span><span id="checkoutTotal">$0.00</span>
        </div>
      </aside>
    </div>
  </main>

  <!-- Order Success Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-icon">✓</div>
      <h2>Order Placed!</h2>
      <p>Thank you for shopping with SneakerVault. Your items are on their way.</p>
      <a href="index.html" class="btn-primary" id="modalBtn">Continue Shopping</a>
    </div>
  </div>

  <footer class="footer">
    <span>© 2025 LUMĒ. Crafted with care.</span>
  </footer>

  <script src="script.js"></script>
  <script>
    renderCheckoutSummary();
    updateCartCount();

    document.getElementById('placeOrderBtn').addEventListener('click', () => {
      const fields = ['firstName','lastName','email','address','city','zip','cardNum','expiry','cvv'];
      const empty = fields.some(id => !document.getElementById(id).value.trim());
      if (empty) {
        alert('Please fill in all fields.');
        return;
      }
      localStorage.removeItem('cart');
      document.getElementById('modalOverlay').classList.add('active');
    });

    document.getElementById('modalBtn').addEventListener('click', () => {
      document.getElementById('modalOverlay').classList.remove('active');
    });
  </script>
</body>
</html>
