<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SneakerVault</title>
  <!-- Apply theme before paint to prevent flash -->
  <script>
    (function() {
      var t = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-logo">SneakerVault</div>
    <div class="nav-links">
      <a href="index.html" class="active">Shop</a>
      <a href="cart.html">Cart</a>
      <a href="checkout.html">Checkout</a>
    </div>
    <div class="nav-actions">
      <div class="nav-search-wrap">
        <span class="nav-search-icon"></span>
        <input
          type="search"
          id="navSearch"
          class="nav-search"
          placeholder="Search sneakers…"
          autocomplete="off"
        />
      </div>
      <button class="dark-toggle" id="darkToggle" title="Toggle dark mode">🌙</button>
      <a href="cart.html" class="cart-icon">
        🛒 <span class="cart-count" id="cartCount">0</span>
      </a>
    </div>
  </nav>

  <!-- HERO -->
<section class="hero">
  <div class="hero-text">
    <p class="hero-sub">New Drop — 2026</p>
    <h1>RE-UP ON<br/><em>A Classic</em></h1>
    <p class="hero-desc">Shop Now →</p>
  </div>
  <div class="hero-blob"></div>
  <div class="hero-slider" id="heroSlider">
    <div class="slides-track" id="slidesTrack">
      <div class="slide">
        <img src="https://takeoffcph.dk/cdn/shop/products/nike-air-jordan-1-mid-chicago-2020.png?v=1666004616&width=480" alt="Air Jordan 1 Mid Chicago 'White'">
        <span class="slide-label">Air Jordan 1 Mid Chicago</span>
      </div>
      <div class="slide">
        <img src="https://takeoffcph.dk/cdn/shop/files/Jordan-4-Retro-Military-Blue-_2024.png?v=1712238888&width=1151" alt="Air Jordan 4 Military Blue"/>
        <span class="slide-label">Air Jordan 4 Military Blue</span>
      </div>
      <div class="slide">
        <img src="https://takeoffcph.dk/cdn/shop/products/Jordan-11-Retro-Playoffs-Bred-_2019.png?v=1679588038&width=480" alt="Air Jordan 11 Bred"/>
        <span class="slide-label">Air Jordan 11 Bred</span>
      </div>
      <div class="slide">
        <img src="https://takeoffcph.dk/cdn/shop/products/new-balance-550-green-white.png?v=1666004766&width=480" alt="Air Jordan 11 Bred"/>
        <span class="slide-label">New Balance 550 'White Green'</span>
      </div>
    </div>
    <button class="slider-arrow prev" id="prevBtn">←</button>
    <button class="slider-arrow next" id="nextBtn">→</button>
    <div class="slider-dots" id="sliderDots"></div>
  </div>
</section>

  <!-- NOTIFICATION -->
  <div class="notification" id="notification">
    <span id="notifText">Added to cart!</span>
  </div>

  <!-- PRODUCTS -->
  <main class="products-section">
    <div class="section-header">
      <h2>Recommended For You</h2>
    </div>
    <div class="brand-filter-strip" id="brandFilterStrip">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="jordan">Jordan</button>
      <button class="filter-btn" data-filter="nike">Nike</button>
      <button class="filter-btn" data-filter="adidas">Adidas</button>
      <button class="filter-btn" data-filter="puma">Puma</button>
      <button class="filter-btn" data-filter="newbalance">New Balance</button>
      <button class="filter-btn" data-filter="converse">Converse</button>
      <button class="filter-btn" data-filter="vans">Vans</button>
      <button class="filter-btn" data-filter="crocs">Crocs</button>
      <button class="filter-btn" data-filter="birkenstock">Birkenstock</button>
      <button class="filter-btn" data-filter="asics">ASICS</button>
      <button class="filter-btn" data-filter="reebok">Reebok</button>
      <button class="filter-btn" data-filter="timberland">Timberland</button>
    </div>
    <div class="products-grid" id="productsGrid"></div>
  </main>

  <footer class="footer">
    <span>© 2026 SneakerVault</span>
  </footer>

  <script src="script.js"></script>
  <script>
    renderProducts();
    updateCartCount();
  </script>
</body>
</html>
